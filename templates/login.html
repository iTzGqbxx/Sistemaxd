{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="glass-card login-card">
        <h2 class="auth-title">Bienvenido</h2>
        <p class="auth-subtitle">Acceso Administrativo E.B.N "General Rafael Urdaneta"</p>

        <form method="POST" action="{{ url_for('login') }}" class="form-group">
            <div class="input-container">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" required placeholder="Ingrese su usuario">
            </div>

            <div class="input-container">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Ingrese la contraseña">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Ingresar al Sistema</button>
        </form>
    </div>
</div>
{% endblock %}
